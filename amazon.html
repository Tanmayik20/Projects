<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Header Clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header class="amazon-header">
        <div class="header-left">
            <a href="#" class="header-logo">
                <img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg" alt="Amazon Logo">
                <span class="logo-country">.in</span> </a>
            <a href="#" class="header-location">
                <i class="fas fa-map-marker-alt"></i>
                <div class="location-text">
                    <span class="deliver-to">Deliver to</span>
                    <span class="user-location">Hyderabad 5000XX</span>
                </div>
            </a>
        </div>

        <div class="header-middle">
            <div class="search-bar">
                <select class="search-dropdown">
                    <option>All</option>
                    <option>Electronics</option>
                    <option>Books</option>
                    <option>Fashion</option>
                    <option>Home</option>
                </select>
                <input type="text" class="search-input" placeholder="Search Amazon.in">
                <button class="search-button">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>

        <div class="header-right">
            <div class="language-selector">
                <img src="https://via.placeholder.com/16x12" alt="US Flag" class="flag-icon"> <span class="language-text">EN</span>
                <i class="fas fa-caret-down"></i>
            </div>
            <a href="#" class="header-account">
                <span class="account-text-top">Hello, sign in</span>
                <span class="account-text-bottom">Accounts & Lists <i class="fas fa-caret-down"></i></span>
            </a>
            <a href="#" class="header-returns">
                <span class="returns-text-top">Returns</span>
                <span class="returns-text-bottom">& Orders</span>
            </a>
            <a href="#" class="header-cart">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count">0</span>
                <span class="cart-text">Cart</span>
            </a>
        </div>
    </header>

    <nav class="sub-nav">
        <a href="#"><i class="fas fa-bars"></i> All</a>
        <a href="#">Today's Deals</a>
        <a href="#">Mobiles</a>
        <a href="#">Customer Service</a>
        <a href="#">Electronics</a>
        <a href="#">New Releases</a>
        <a href="#">Prime</a>
        <a href="#">Fashion</a>
        <a href="#">Books</a>
    </nav>
</body>
</html>
